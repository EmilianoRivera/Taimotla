{% extends 'base.html' %}

{% block content %}
    <div class="section-header">
        <h2>Modificar Datos de Contacto</h2>
    </div>

    {% if user %}
    <form  action="{{url_for('director.actualizar', curp=user.curp)}}"  method="POST" class="registro-form">
        <fieldset>
            <legend>Actualizando datos de: {{ user.p_nombre }} {{ user.p_apellido }}</legend>
            <div class="form-grid">
                <div class="form-group">
                    <label>Correo Electrónico *</label>
                    <input type="email" name="correo" value="{{ user.correo }}" required>
                </div>
                
                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="text" name="telefono" value="{{ user.telefono }}">
                </div>
                
                <div class="form-group">
                    <label>Calle</label>
                    <input type="text" name="calle" value="{{ user.calle }}">
                </div>
                
            </div>
        </fieldset>

        <div class="form-actions">
            <button type="submit" class="btn-principal">Guardar Cambios</button>
        </div>
    </form>
    {% else %}
        <p>Usuario no encontrado.</p>
    {% endif %}
{% endblock %}
